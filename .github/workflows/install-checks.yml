name: install-checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: install-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  build-artifacts:
    name: Build PR artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Build snapshot archives
        shell: bash
        run: >-
          goreleaser release
          --snapshot
          --clean
          --skip=publish

      - name: Upload Linux amd64 archive
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-linux-amd64
          path: dist/mdtoc_linux_amd64.tar.gz
          if-no-files-found: error

      - name: Upload Debian amd64 package
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-deb-amd64
          path: dist/mdtoc_*_amd64.deb
          if-no-files-found: error

      - name: Upload RPM amd64 package
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-rpm-amd64
          path: dist/mdtoc_*_amd64.rpm
          if-no-files-found: error

      - name: Upload macOS amd64 archive
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-darwin-amd64
          path: dist/mdtoc_darwin_amd64.tar.gz
          if-no-files-found: error

      - name: Upload Windows amd64 archive
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-windows-amd64
          path: dist/mdtoc_windows_amd64.zip
          if-no-files-found: error

  install-check-linux:
    name: Install Check Linux
    runs-on: ubuntu-latest
    needs: build-artifacts
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Linux amd64 archive
        uses: actions/download-artifact@v5
        with:
          name: mdtoc-linux-amd64
          path: artifacts

      - name: Unpack archive
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf artifacts/mdtoc_linux_amd64.tar.gz -C artifacts
          test -x artifacts/mdtoc_linux_amd64/mdtoc

      - name: Verify binary runs
        shell: bash
        run: |
          set -euo pipefail
          artifacts/mdtoc_linux_amd64/mdtoc --version

      - name: Run smoke test fixture
        shell: bash
        run: |
          set -euo pipefail
          cp .github/fixtures/install-smoke.md artifacts/smoke.md
          artifacts/mdtoc_linux_amd64/mdtoc generate -f artifacts/smoke.md
          artifacts/mdtoc_linux_amd64/mdtoc check -f artifacts/smoke.md
          grep -Fq 'bullets=auto' artifacts/smoke.md
          grep -Fq '+ [1. 2026 Release Plan](#2026-release-plan)' artifacts/smoke.md
          grep -Fq '+ [2. Overview](#overview)' artifacts/smoke.md
          grep -Fq '+ [3. Overview](#overview-1)' artifacts/smoke.md
          grep -Fq '## 1. <a id="2026-release-plan"></a>2026 Release Plan' artifacts/smoke.md
          grep -Fq '## 2. <a id="overview"></a>Overview' artifacts/smoke.md
          grep -Fq '## 3. <a id="overview-1"></a>Overview' artifacts/smoke.md
          grep -Fq '## Hidden Section' artifacts/smoke.md
          grep -Fq '### Hidden Details' artifacts/smoke.md
          if grep -Fq 'Code Heading](#code-heading)' artifacts/smoke.md; then
            echo 'fenced code heading leaked into managed output'
            exit 1
          fi
          if grep -Fq 'Hidden Section](#hidden-section)' artifacts/smoke.md; then
            echo 'excluded heading leaked into managed ToC'
            exit 1
          fi
          if grep -Fq '## 4. <a id="hidden-section"></a>Hidden Section' artifacts/smoke.md; then
            echo 'excluded heading was rewritten'
            exit 1
          fi

  install-check-macos:
    name: Install Check macOS
    runs-on: macos-latest
    needs: build-artifacts
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download macOS amd64 archive
        uses: actions/download-artifact@v5
        with:
          name: mdtoc-darwin-amd64
          path: artifacts

      - name: Unpack archive
        shell: bash
        run: |
          set -euo pipefail
          tar -xzf artifacts/mdtoc_darwin_amd64.tar.gz -C artifacts
          test -x artifacts/mdtoc_darwin_amd64/mdtoc

      - name: Verify binary runs
        shell: bash
        run: |
          set -euo pipefail
          artifacts/mdtoc_darwin_amd64/mdtoc --version

      - name: Run smoke test fixture
        shell: bash
        run: |
          set -euo pipefail
          cp .github/fixtures/install-smoke.md artifacts/smoke.md
          artifacts/mdtoc_darwin_amd64/mdtoc generate -f artifacts/smoke.md
          artifacts/mdtoc_darwin_amd64/mdtoc check -f artifacts/smoke.md
          grep -Fq 'bullets=auto' artifacts/smoke.md
          grep -Fq '+ [1. 2026 Release Plan](#2026-release-plan)' artifacts/smoke.md
          grep -Fq '+ [2. Overview](#overview)' artifacts/smoke.md
          grep -Fq '+ [3. Overview](#overview-1)' artifacts/smoke.md
          grep -Fq '## 1. <a id="2026-release-plan"></a>2026 Release Plan' artifacts/smoke.md
          grep -Fq '## 2. <a id="overview"></a>Overview' artifacts/smoke.md
          grep -Fq '## 3. <a id="overview-1"></a>Overview' artifacts/smoke.md
          grep -Fq '## Hidden Section' artifacts/smoke.md
          grep -Fq '### Hidden Details' artifacts/smoke.md
          if grep -Fq 'Code Heading](#code-heading)' artifacts/smoke.md; then
            echo 'fenced code heading leaked into managed output'
            exit 1
          fi
          if grep -Fq 'Hidden Section](#hidden-section)' artifacts/smoke.md; then
            echo 'excluded heading leaked into managed ToC'
            exit 1
          fi
          if grep -Fq '## 4. <a id="hidden-section"></a>Hidden Section' artifacts/smoke.md; then
            echo 'excluded heading was rewritten'
            exit 1
          fi

  install-check-debian:
    name: Install Check Debian
    runs-on: ubuntu-latest
    needs: build-artifacts
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Debian amd64 package
        uses: actions/download-artifact@v5
        with:
          name: mdtoc-deb-amd64
          path: artifacts

      - name: Install Debian package
        shell: bash
        run: |
          set -euo pipefail
          package="$(find artifacts -maxdepth 1 -name '*.deb' -print -quit)"
          test -n "$package"
          sudo dpkg -i "$package"
          test -x /usr/bin/mdtoc

      - name: Verify installed binary and smoke test
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/mdtoc --version
          cp .github/fixtures/install-smoke.md artifacts/smoke.md
          /usr/bin/mdtoc generate -f artifacts/smoke.md
          /usr/bin/mdtoc check -f artifacts/smoke.md
          grep -Fq 'bullets=auto' artifacts/smoke.md
          grep -Fq '+ [1. 2026 Release Plan](#2026-release-plan)' artifacts/smoke.md
          grep -Fq '+ [2. Overview](#overview)' artifacts/smoke.md
          grep -Fq '+ [3. Overview](#overview-1)' artifacts/smoke.md
          grep -Fq '## 1. <a id="2026-release-plan"></a>2026 Release Plan' artifacts/smoke.md
          grep -Fq '## 2. <a id="overview"></a>Overview' artifacts/smoke.md
          grep -Fq '## 3. <a id="overview-1"></a>Overview' artifacts/smoke.md
          grep -Fq '## Hidden Section' artifacts/smoke.md
          grep -Fq '### Hidden Details' artifacts/smoke.md
          if grep -Fq 'Code Heading](#code-heading)' artifacts/smoke.md; then
            echo 'fenced code heading leaked into managed output'
            exit 1
          fi
          if grep -Fq 'Hidden Section](#hidden-section)' artifacts/smoke.md; then
            echo 'excluded heading leaked into managed ToC'
            exit 1
          fi
          if grep -Fq '## 4. <a id="hidden-section"></a>Hidden Section' artifacts/smoke.md; then
            echo 'excluded heading was rewritten'
            exit 1
          fi

  install-check-rpm:
    name: Install Check RPM
    runs-on: ubuntu-latest
    needs: build-artifacts
    timeout-minutes: 10
    container:
      image: fedora:42

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download RPM amd64 package
        uses: actions/download-artifact@v5
        with:
          name: mdtoc-rpm-amd64
          path: artifacts

      - name: Install RPM package
        shell: bash
        run: |
          set -euo pipefail
          package="$(find artifacts -maxdepth 1 -name '*.rpm' -print -quit)"
          test -n "$package"
          dnf install -y "$package"
          test -x /usr/bin/mdtoc

      - name: Verify installed binary and smoke test
        shell: bash
        run: |
          set -euo pipefail
          /usr/bin/mdtoc --version
          cp .github/fixtures/install-smoke.md artifacts/smoke.md
          /usr/bin/mdtoc generate -f artifacts/smoke.md
          /usr/bin/mdtoc check -f artifacts/smoke.md
          grep -Fq 'bullets=auto' artifacts/smoke.md
          grep -Fq '+ [1. 2026 Release Plan](#2026-release-plan)' artifacts/smoke.md
          grep -Fq '+ [2. Overview](#overview)' artifacts/smoke.md
          grep -Fq '+ [3. Overview](#overview-1)' artifacts/smoke.md
          grep -Fq '## 1. <a id="2026-release-plan"></a>2026 Release Plan' artifacts/smoke.md
          grep -Fq '## 2. <a id="overview"></a>Overview' artifacts/smoke.md
          grep -Fq '## 3. <a id="overview-1"></a>Overview' artifacts/smoke.md
          grep -Fq '## Hidden Section' artifacts/smoke.md
          grep -Fq '### Hidden Details' artifacts/smoke.md
          if grep -Fq 'Code Heading](#code-heading)' artifacts/smoke.md; then
            echo 'fenced code heading leaked into managed output'
            exit 1
          fi
          if grep -Fq 'Hidden Section](#hidden-section)' artifacts/smoke.md; then
            echo 'excluded heading leaked into managed ToC'
            exit 1
          fi
          if grep -Fq '## 4. <a id="hidden-section"></a>Hidden Section' artifacts/smoke.md; then
            echo 'excluded heading was rewritten'
            exit 1
          fi

  install-check-windows:
    name: Install Check Windows
    runs-on: windows-latest
    needs: build-artifacts
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download Windows amd64 archive
        uses: actions/download-artifact@v5
        with:
          name: mdtoc-windows-amd64
          path: artifacts

      - name: Unpack archive
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Expand-Archive -Path artifacts/mdtoc_windows_amd64.zip -DestinationPath artifacts/windows
          if (-not (Test-Path artifacts/windows/mdtoc_windows_amd64/mdtoc.exe)) {
            throw 'Expected mdtoc.exe was not found in the Windows archive.'
          }

      - name: Verify binary runs
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          ./artifacts/windows/mdtoc_windows_amd64/mdtoc.exe --version

      - name: Run smoke test fixture
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          Copy-Item .github/fixtures/install-smoke.md artifacts/smoke.md
          ./artifacts/windows/mdtoc_windows_amd64/mdtoc.exe generate -f artifacts/smoke.md
          ./artifacts/windows/mdtoc_windows_amd64/mdtoc.exe check -f artifacts/smoke.md
          $content = Get-Content artifacts/smoke.md -Raw
          $required = @(
            'bullets=auto',
            '+ [1. 2026 Release Plan](#2026-release-plan)',
            '+ [2. Overview](#overview)',
            '+ [3. Overview](#overview-1)',
            '## 1. <a id="2026-release-plan"></a>2026 Release Plan',
            '## 2. <a id="overview"></a>Overview',
            '## 3. <a id="overview-1"></a>Overview',
            '## Hidden Section',
            '### Hidden Details'
          )
          foreach ($marker in $required) {
            if (-not $content.Contains($marker)) {
              throw "Smoke fixture is missing expected marker: $marker"
            }
          }
          $forbidden = @(
            'Code Heading](#code-heading)',
            'Hidden Section](#hidden-section)',
            '## 4. <a id="hidden-section"></a>Hidden Section'
          )
          foreach ($marker in $forbidden) {
            if ($content.Contains($marker)) {
              throw "Smoke fixture contains forbidden marker: $marker"
            }
          }
