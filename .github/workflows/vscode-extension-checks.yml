name: vscode-extension-checks

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: vscode-extension-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  package-vsix:
    name: Package VSIX
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: "~> v2"
          install-only: true

      - name: Build snapshot archives
        shell: bash
        run: >-
          goreleaser release
          --snapshot
          --clean
          --skip=publish

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Package all MVP VSIX targets
        working-directory: extension
        run: npm run package:release

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: mdtoc-vscode-vsix
          path: extension/out/*.vsix
          if-no-files-found: error
