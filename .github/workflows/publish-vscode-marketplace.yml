name: publish-vscode-marketplace

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to download VSIX assets from
        required: true
        type: string
      publish:
        description: Publish the downloaded VSIX files to the VS Code Marketplace
        required: true
        default: false
        type: boolean
  release:
    types:
      - published

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  VSCE_PAT: ${{ secrets.VSCE_PAT }}

permissions:
  contents: read

jobs:
  publish-vsix:
    name: Publish VSIX to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            tag="${{ github.event.release.tag_name }}"
          else
            tag="${{ inputs.tag }}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
        id: release_tag

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ format('refs/tags/{0}', steps.release_tag.outputs.tag) }}

      - name: Verify checked out release tag
        shell: bash
        run: |
          tag="$(git describe --tags --exact-match)"
          if [ "$tag" != "${{ steps.release_tag.outputs.tag }}" ]; then
            echo "Checked out tag $tag does not match requested tag ${{ steps.release_tag.outputs.tag }}"
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Download VSIX release assets
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p extension/out
          gh release download "${{ steps.release_tag.outputs.tag }}" \
            --pattern 'mdtoc-vscode-*.vsix' \
            --dir extension/out

      - name: Verify VSIX asset count
        shell: bash
        run: |
          shopt -s nullglob
          files=(extension/out/mdtoc-vscode-*.vsix)
          if [ "${#files[@]}" -ne 5 ]; then
            echo "Expected 5 VSIX files, found ${#files[@]}."
            printf '%s\n' "${files[@]}"
            exit 1
          fi

      - name: Publish VSIX assets
        if: github.event_name == 'release' || inputs.publish
        shell: bash
        working-directory: extension
        run: |
          set -Eeuo pipefail
          shopt -s nullglob

          export PATH="$PWD/node_modules/.bin:$PATH"

          echo "Working directory: $PWD"
          echo "vsce path: $(command -v vsce || true)"
          vsce --version

          files=(out/mdtoc-vscode-*.vsix)

          if [ "${#files[@]}" -eq 0 ]; then
            echo "No VSIX files found matching out/mdtoc-vscode-*.vsix"
            echo "Available VSIX files below extension/:"
            find . -maxdepth 4 -type f -name '*.vsix' -print | sort
            exit 1
          fi

          echo "Found ${#files[@]} VSIX file(s) to publish:"
          printf ' - %s\n' "${files[@]}"

          for file in "${files[@]}"; do
            echo "::group::Inspect $file"
            ls -lh "$file"
            unzip -t "$file"
            echo "package.json from $file:"
            unzip -p "$file" extension/package.json | node -e '
              let input = "";
              process.stdin.on("data", chunk => input += chunk);
              process.stdin.on("end", () => {
                const p = JSON.parse(input);
                console.log(JSON.stringify({
                  publisher: p.publisher,
                  name: p.name,
                  displayName: p.displayName,
                  version: p.version,
                  engines: p.engines,
                  main: p.main,
                  browser: p.browser,
                  icon: p.icon
                }, null, 2));
              });
            '
            echo "::endgroup::"

            echo "::group::Publish $file"
            vsce publish --packagePath "$file" -p "$VSCE_PAT" || {
              status=$?
              echo "::endgroup::"
              echo "Failed to publish $file"
              echo "Exit status: $status"
              echo "The VSIX was valid as a ZIP, so check the vsce output above for Marketplace/API, duplicate version, target, or validation errors."
              exit "$status"
            }
            echo "::endgroup::"
          done
