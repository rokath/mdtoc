name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Normal case: Pages is already enabled in repository settings and the
      # publishing source is set to GitHub Actions.
      - name: Setup Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN == '' }}
        uses: actions/configure-pages@v6

      # Optional bootstrap path: if an admin-level token is provided, the
      # action can enable Pages automatically for repositories where the site
      # has not been created yet.
      - name: Setup and enable Pages
        if: ${{ secrets.PAGES_ENABLEMENT_TOKEN != '' }}
        uses: actions/configure-pages@v6
        with:
          token: ${{ secrets.PAGES_ENABLEMENT_TOKEN }}
          enablement: true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
