name: goreleaser

on:
  # This workflow is only triggered manually from the GitHub UI.
  # Go to: Actions -> "goreleaser" workflow -> "Run workflow".
  # This matches your intent: no automatic releases on push or tag.
  workflow_dispatch:
  # If in the future you want to trigger releases when pushing tags,
  # you can uncomment the block below:
  #
  # push:
  #   tags:
  #     - 'v*'          # e.g. v0.1.0, v1.2.3

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  goreleaser:
    name: Run GoReleaser
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          # Fetch the full git history.
          # GoReleaser uses tags and commits to determine the version
          # and to generate changelogs. With a shallow clone this may fail
          # or produce incomplete changelogs.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Use the Go version declared in go.mod.
          # This keeps local development and CI in sync automatically.
          go-version-file: go.mod
          # This repository currently has no go.sum, so the built-in cache
          # would only emit a warning and provide no benefit.
          cache: false
          # Alternatively you could hard-code a version:
          # go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Align extension version with release tag
        shell: bash
        working-directory: extension
        run: |
          tag="$(git describe --tags --exact-match)"
          version="${tag#v}"
          npm version --no-git-tag-version "$version"

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          # Use the standard GoReleaser distribution.
          distribution: goreleaser
          # Use the current GoReleaser major line explicitly to avoid
          # ambiguous "latest" resolution warnings in CI logs.
          version: "~> v2"
          # "release --clean" is the modern equivalent of "--rm-dist":
          # it removes the dist/ directory before building, so you never
          # accidentally ship stale artifacts from a previous run.
          args: release --clean
        env:
          # GitHub automatically provides this token.
          # GoReleaser uses it to create or update the GitHub Release and
          # upload the build artifacts (archives, checksums, etc.).
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repository Homebrew tap publishing needs a dedicated token
          # with contents:write on rokath/homebrew-tap. Configure it as a
          # repository secret in this repo before running release publishing.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Package VSIX release assets
        working-directory: extension
        run: npm run package:release

      - name: Upload VSIX assets to GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="$(git describe --tags --exact-match)"
          gh release upload "$tag" extension/out/*.vsix --clobber
